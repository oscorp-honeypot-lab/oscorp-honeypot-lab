name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Validate Docker Compose syntax ──────────────────────────────────────────
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lab profile
        run: docker compose --profile lab config --quiet
      - name: real profile
        run: docker compose --profile real config --quiet

  # ── Python lint (ruff) ──────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Check backend, pipeline, scripts
        run: |
          python -m ruff check \
            backend/app backend/tests \
            scripts/process_cowrie_ndjson.py \
            pipeline/

  # ── TypeScript type check ───────────────────────────────────────────────────
  typecheck-frontend:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # ── Frontend unit tests (vitest) ───────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # ── Pipeline unit tests (unittest) ─────────────────────────────────────────
  test-pipeline:
    name: Pipeline Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Discover and run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
        working-directory: pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts

  # ── Backend unit + contract tests (pytest, no DB) ──────────────────────────
  test-backend-unit:
    name: Backend Unit + Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: Run unit and contract tests
        run: python -m pytest tests/unit tests/contract -v --tb=short
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          OSCORP_API_DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
          OSCORP_API_ADMIN_PASSWORD: CiTestPassword2026!
          OSCORP_API_COOKIE_SECURE: "false"

  # ── Backend integration tests (pytest + postgres service) ──────────────────
  test-backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oscorp
          POSTGRES_PASSWORD: oscorp_ci
          POSTGRES_DB: oscorp
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipeline deps (alembic + psycopg)
        run: pip install -r pipeline/requirements.txt
      - name: Apply migrations
        run: python -m alembic upgrade head
        working-directory: pipeline
        env:
          DATABASE_URL: postgresql+psycopg://oscorp:oscorp_ci@localhost:5432/oscorp
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Bootstrap admin user
        run: python -m app.infrastructure.bootstrap
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          OSCORP_API_DATABASE_URL: postgresql+psycopg://oscorp:oscorp_ci@localhost:5432/oscorp
          OSCORP_API_ADMIN_USERNAME: admin
          OSCORP_API_ADMIN_PASSWORD: CiTestPassword2026!
          OSCORP_API_ENVIRONMENT: lab
          OSCORP_API_COOKIE_SECURE: "false"
      - name: Run integration tests with coverage
        run: |
          python -m pytest tests/integration -v --tb=short \
            --cov=app --cov-report=term-missing --cov-fail-under=60
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          OSCORP_API_DATABASE_URL: postgresql+psycopg://oscorp:oscorp_ci@localhost:5432/oscorp
          OSCORP_API_ADMIN_USERNAME: admin
          OSCORP_API_ADMIN_PASSWORD: CiTestPassword2026!
          OSCORP_API_ENVIRONMENT: lab
          OSCORP_API_COOKIE_SECURE: "false"
