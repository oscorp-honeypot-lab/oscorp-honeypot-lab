line-length = 100
target-version = "py312"

[lint]
select = ["E4", "E7", "E9", "F", "I"]

[lint.isort]
known-first-party = [
  "app",
  "process_cowrie_ndjson",
  "pipeline_worker",
  "risk",
  "geo",
  "vt",
  "alerts",
  "reports",
  "contracts",
]

[lint.per-file-ignores]
"pipeline/migrations/versions/*.py" = ["I001"]
